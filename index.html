<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Архив ширяевской биеннале</title>

    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">

    <link rel="stylesheet" href="stylesheets/reset.css">
    <link rel="stylesheet" href="stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/responsive.css">
</head>

<body>

    <!-- HEADER -->

    <header class="navbar">

    <div class="navbar_c">

        <div class="archive">
            Архив ширяевской биеннале
        </div>

        <div class="progylka">
            Прогулка
        </div>

        <div class="how_works">
            Как это работает?
        </div>

    </div>

</header>

    <!-- MAIN -->

    <main class="main">

        <!-- Контейнер карты -->

        <div class="map-container">

            <!-- Слой изображений -->
            <div id="images-layer"></div>

            <!-- Карта -->

            <img
                src="images/map.svg"
                alt="Карта"
                id="map"
                class="map"
            >

            <!-- Слой квадратов -->

            <div id="markers-layer"></div>

            <!-- Слой подписей -->

            <div id="captions-layer"></div>

        </div>

        <!-- Аудио -->

        <div class="audio-container">

            <audio
                id="audio-player"
                controls
                preload="metadata"
            ></audio>

        </div>

    </main>

    <script src="javascripts/main.js"></script>

</body>

</html>
